ext {
    def prodKeystoreConfigFile = rootProject.file("keystore/keystore_release.properties")
    if (prodKeystoreConfigFile.exists()) {
        println "Start extract release keystore app_config.dart from keystore_release.properties"
        def keystoreProps = new Properties()
        keystoreProps.load(new FileInputStream(prodKeystoreConfigFile))
        prodKeystoreConfig = [
                storePassword: keystoreProps['storePassword'],
                keyPassword  : keystoreProps['keyPassword'],
                keyAlias     : keystoreProps['keyAlias'],
                storeFile    : keystoreProps['storeFile']
        ]
    } else {
        println "Start extract release keystore app_config.dart from global vars"
        prodKeystoreConfig = [
                storePassword: System.getenv('storePassword'),
                keyPassword  : System.getenv('keyPassword'),
                keyAlias     : System.getenv('keyAlias'),
                storeFile    : System.getenv('storeFile')
        ]
    }
    if (!prodKeystoreConfig.storeFile) {
        prodKeystoreConfig.storeFile = "no_keystore_file" //fix crash file(storeFile)
    }
    println "Extracted keystore app_config.dart: $prodKeystoreConfig"

    def devKeystorePropsFile = rootProject.file("keystore/keystore_dev.properties")
