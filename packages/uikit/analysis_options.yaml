include: package:flutter_lints/flutter.yaml

formatter:
  trailing_commas: preserve
  page_width: 100

linter:
  rules:
    public_member_api_docs: true
    do_not_use_environment: false

analyzer:
  exclude:
    - lib/**/*.g.dart
    - lib/**/*.freezed.dart
    - lib/assets/**
    - tools/bricks/**/__brick__/**
