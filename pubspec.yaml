  api: ^1.0.0
  auto_route: 10.1.0+1
  bloc: 9.0.0
  bloc_concurrency: 0.3.0
  collection: 1.19.1
  database: 1.0.0
  flutter:
    sdk: flutter
  flutter_bloc: 9.1.1
  flutter_easy_dialogs: 4.0.3
  flutter_displaymode: 0.6.0
  flutter_localizations:
    sdk: flutter
  freezed_annotation: 3.0.0
  haptics:
    git: https://github.com/samirakhmedov/haptics.git
  intl: 0.20.2
  network: 1.0.0
  provider: 6.1.5
  storage: 1.0.0
  uikit: 1.0.0
  vector_graphics: 1.1.19
  yx_scope: 1.0.2

workspace:
  - packages/storage
  - packages/network
  - packages/database
  - packages/api
  - packages/uikit

dev_dependencies:
  auto_route_generator: 10.2.3
  build_runner: 2.5.4
  flutter_test:
    sdk: flutter
  freezed: 3.0.6
  mocktail: 1.0.4
  melos: 6.3.3
  surf_dcm_presets: 0.1.1
  surf_lint_rules: 4.0.0
  surf_widget_test_composer: 0.0.6
  vector_graphics_compiler: 1.1.17

flutter:
  generate: true
  default-flavor: prodGms
  uses-material-design: false

  assets:
    - assets/resources/vectors/

  shaders:
    - assets/shaders/shimmer.frag

  # An image asset can refer to one or more resolution-specific "variants", see
