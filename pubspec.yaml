name: app_template
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: 3.11.0
  flutter: 3.41.0

dependencies:
  # analytics_interface: 
  # analytics_gms: 
  # analytics_hms: 
  # push_interface: 
  # push_gms: 
  # push_hms: 
  # location_interface: 
  # location_gms: 
  # location_hms: 
  api:
  auto_route: 10.1.0+1
  bloc: 9.0.0
  bloc_concurrency: 0.3.0
  collection: 1.19.1
  database:
  flutter:
    sdk: flutter
  flutter_bloc: 9.1.1
  flutter_easy_dialogs: 4.0.3
  flutter_displaymode: 0.6.0
  flutter_localizations:
    sdk: flutter
  freezed_annotation: 3.0.0
  haptics:
    git: https://github.com/samirakhmedov/haptics.git
  intl: 0.20.2
  network:
  provider: 6.1.5
  storage:
  uikit:
  vector_graphics: 1.1.19
  yx_scope: 1.0.2

workspace:
  - packages/analytics/gms
  - packages/analytics/hms
  - packages/analytics/interface
  - packages/api
  - packages/database
  - packages/location/gms
  - packages/location/hms
  - packages/location/interface
  - packages/network
  - packages/push/gms
  - packages/push/hms
  - packages/push/interface
  - packages/storage
  - packages/uikit

dev_dependencies:
  auto_route_generator: 10.2.3
  build_runner: 2.5.4
  flutter_test:
    sdk: flutter
  freezed: 3.0.6
  mocktail: 1.0.4
  melos: 6.3.3
  surf_dcm_presets: 0.1.1
  surf_lint_rules: 4.0.0
  surf_widget_test_composer: 0.0.6
  vector_graphics_compiler: 1.1.17

flutter:
  generate: true
  default-flavor: prodGms
  uses-material-design: false

  assets:
    - assets/resources/vectors/

  shaders:
    - assets/shaders/shimmer.frag

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # fonts:
