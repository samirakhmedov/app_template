name: app_template
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: 3.8.1
  flutter: ">=3.3.0"

dependencies:
  # analytics_interface:
  #   path: packages/analytics/interface
  # analytic:
  #   path: packages/analytics/gms
  # push_interface:
